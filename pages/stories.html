    }

      font-size: 15px;
      font-weight: 600;

      font-size: 14px;

// ===== Blessing Counts (from localStorage) =====
function getBlessings() {
  try {
    var data = localStorage.getItem('storyBlessings');
    return data ? JSON.parse(data) : {};
  } catch(e) {
    return {};
  }
}
function saveBlessings(blessings) {
  try {
    localStorage.setItem('storyBlessings', JSON.stringify(blessings));
  } catch(e) {}
}

// ===== Get Stories =====
function getStories() {
  // Try Store.getStories() if available
  if (typeof Store !== 'undefined' && typeof Store.getStories === 'function') {
    var storeStories = Store.getStories();
    if (storeStories && storeStories.length > 0) {
      return storeStories;
    }
  }
  // Try localStorage
  try {
    var data = localStorage.getItem('stories');
    if (data) {
      var parsed = JSON.parse(data);
      if (parsed && parsed.length > 0) return parsed;
    }
  } catch(e) {}
  // Fallback to hardcoded
  return hardcodedStories;
}

  var blessings = getBlessings();

  if (!stories || stories.length === 0) {
    container.innerHTML = '<div class="empty-state">暂无成功故事，敬请期待……</div>';
    return;
  }

  var html = '';
  stories.forEach(function(story, index) {
    var storyBlessings = (blessings[story.id] || 0) + (story.blessings || 0);
    var contentParagraphs = '';
    if (story.content && Array.isArray(story.content)) {
      story.content.forEach(function(p) {
        contentParagraphs += '<p>' + escapeHtml(p) + '</p>';
      });
    } else if (story.content) {
      contentParagraphs = '<p>' + escapeHtml(String(story.content)) + '</p>';
    }

    html += '<article class="story-card">';
    html += '  <div class="story-inner">';
    html += '    <div class="story-photo" aria-label="照片占位">💑</div>';
    html += '    <div class="story-body">';
    html += '      <h2 class="story-title">' + escapeHtml(story.title) + '</h2>';
    html += '      <p class="story-summary">' + escapeHtml(story.summary || '') + '</p>';
    html += '      <div class="story-content">' + contentParagraphs + '</div>';
    html += '    </div>';
    html += '  </div>';
    html += '  <div class="story-footer">';
    html += '    <span class="story-date">📅 ' + escapeHtml(story.date || '') + '</span>';
    html += '    <button class="bless-btn" onclick="blessStory(' + story.id + ')">';
    html += '      ❤️ 祝福他们 <span class="count" id="blessCount-' + story.id + '">(' + storyBlessings + ')</span>';
    html += '    </button>';
    html += '  </div>';
    html += '</article>';

    // Add heart divider or quote divider between stories
    if (index < stories.length - 1) {
      if (index % 2 === 0) {
        html += '<div class="heart-divider">❤️ ❤️ ❤️</div>';
      } else {
        var quote = quotes[index % quotes.length];
        html += '<div class="quote-divider">' + escapeHtml(quote) + '</div>';
      }
    }
  });

  container.innerHTML = html;
}

// ===== Helper =====
function escapeHtml(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(String(str)));
  return div.innerHTML;
}

// ===== Bless Story =====
window.blessStory = function(storyId) {
  var blessings = getBlessings();
  blessings[storyId] = (blessings[storyId] || 0) + 1;
  saveBlessings(blessings);
  var countEl = document.getElementById('blessCount-' + storyId);
  if (countEl) {
    countEl.textContent = '(' + (blessings[storyId] + (getStories().find(function(s){return s.id===storyId;}) || {}).blessings || 0) + ')';
  }
  // Simple toast
  showToast('感谢您的祝福！❤️');
};

function showToast(msg) {
  var toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#c0392b;color:#fff;padding:12px 28px;border-radius:30px;font-size:18px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);animation:fadeInUp 0.3s ease;pointer-events:none;';
  document.body.appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.4s';
    setTimeout(function() { if(toast.parentNode) toast.parentNode.removeChild(toast); }, 400);
  }, 2000);
}

// ===== Header: Check Login State =====
function updateHeader() {
  var currentUser = null;
  try {
    var stored = localStorage.getItem('currentUser');
    if (stored) currentUser = JSON.parse(stored);
    if (!currentUser && typeof Auth !== 'undefined' && typeof Auth.getCurrentUser === 'function') {
      currentUser = Auth.getCurrentUser();
    }
  } catch(e) {}

  var authBtns = document.getElementById('authBtns');
  var userNav = document.getElementById('userNav');

  if (currentUser && currentUser.name) {
    if (authBtns) authBtns.style.display = 'none';
    if (userNav) {
      userNav.style.display = 'flex';
      document.getElementById('userNameDisplay').textContent = currentUser.name;
      document.getElementById('userAvatar').textContent = (currentUser.name || 'U').charAt(0);
    }
  } else {
    if (authBtns) authBtns.style.display = 'flex';
    if (userNav) userNav.style.display = 'none';
  }
}

window.doLogout = function() {
  try { localStorage.removeItem('currentUser'); } catch(e) {}
  if (typeof Auth !== 'undefined' && typeof Auth.logout === 'function') {
    Auth.logout();
  }
  updateHeader();
  // Also update main nav for auth pages
  showToast('已退出登录');
};

// ===== Init =====
renderStories();
updateHeader();

})();
</script>
