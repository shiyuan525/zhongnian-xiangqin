<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交友活动 - 中年相亲网</title>

  <!-- Common CSS -->
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">

  <style>
    /* ========== Page Layout ========== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family-base);
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      min-height: 100vh;
      line-height: var(--line-height-base);
      padding-top: 72px;
    }

    /* ========== Skip Link ========== */
    .skip-link {
      position: absolute;
      top: -100%;
      left: var(--space-md);
      z-index: var(--z-tooltip);
      padding: var(--space-sm) var(--space-md);
      background-color: var(--color-primary);
      color: var(--color-text-on-primary);
      font-weight: var(--font-weight-bold);
      font-size: calc(var(--font-size-base) * var(--font-scale));
      border-radius: var(--radius-md);
      text-decoration: none;
      transition: top var(--transition-fast);
    }
    .skip-link:focus {
      top: var(--space-sm);
    }

    /* ========== Sticky Header ========== */
    .site-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: var(--z-sticky);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border-light);
      box-shadow: var(--shadow-sm);
      height: 72px;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
      max-width: var(--container-wide);
      margin: 0 auto;
      padding: 0 var(--space-lg);
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      font-size: calc(var(--font-size-xl) * var(--font-scale));
      font-weight: var(--font-weight-bold);
      color: var(--color-primary);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .header-logo:hover {
      color: var(--color-primary-hover);
    }

    .main-nav {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      list-style: none;
    }
    .main-nav a {
      display: inline-flex;
      align-items: center;
      padding: var(--space-sm) var(--space-md);
      font-size: calc(18px * var(--font-scale));
      font-weight: var(--font-weight-medium);
      color: var(--color-text-secondary);
      text-decoration: none;
      border-radius: var(--radius-md);
      min-height: var(--tap-target-min);
      transition: color var(--transition-fast), background-color var(--transition-fast);
      white-space: nowrap;
    }
    .main-nav a:hover {
      color: var(--color-primary);
      background-color: var(--color-primary-subtle);
    }
    .main-nav a.nav-current {
      color: var(--color-primary);
      background-color: var(--color-primary-light);
      font-weight: var(--font-weight-semibold);
    }

    /* User Menu */
    .user-menu {
      position: relative;
      flex-shrink: 0;
    }
    .user-menu-trigger {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      font-size: calc(18px * var(--font-scale));
      font-weight: var(--font-weight-medium);
      color: var(--color-text-primary);
      background: none;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      min-height: var(--tap-target-min);
      transition: background-color var(--transition-fast);
    }
    .user-menu-trigger:hover {
      background-color: var(--color-bg);
    }
    .user-menu-trigger .avatar-sm {
      width: 40px;
      height: 40px;
      font-size: calc(18px * var(--font-scale));
    }
    .user-menu-trigger .arrow-down {
      font-size: 12px;
      color: var(--color-text-tertiary);
      transition: transform var(--transition-fast);
    }
    .user-menu.open .user-menu-trigger .arrow-down {
      transform: rotate(180deg);
    }
    .user-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      min-width: 200px;
      background: var(--color-surface);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      z-index: var(--z-dropdown);
      overflow: hidden;
      padding: var(--space-xs) 0;
    }
    .user-menu.open .user-dropdown {
      display: block;
    }
    .user-dropdown a,
    .user-dropdown button {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      width: 100%;
      padding: var(--space-sm) var(--space-md);
      font-size: calc(var(--font-size-base) * var(--font-scale));
      font-family: var(--font-family-base);
      color: var(--color-text-primary);
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      min-height: 48px;
      transition: background-color var(--transition-fast);
    }
    .user-dropdown a:hover,
    .user-dropdown button:hover {
      background-color: var(--color-bg);
    }
    .user-dropdown .dropdown-divider {
      height: 1px;
      background: var(--color-border-light);
      margin: var(--space-xs) 0;
    }
    .user-dropdown .logout-btn {
      color: var(--color-danger);
    }

    /* Mobile Nav */
    .mobile-nav-toggle {
      display: none;
      width: 48px;
      height: 48px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: var(--radius-sm);
    }
    .mobile-nav-toggle span {
      display: block;
      width: 24px;
      height: 3px;
      background: var(--color-text-primary);
      border-radius: 2px;
      transition: all var(--transition-fast);
    }
    .mobile-nav-panel {
      display: none;
      position: fixed;
      top: 72px;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--color-surface);
      z-index: var(--z-fixed);
      padding: var(--space-lg);
      overflow-y: auto;
    }
    .mobile-nav-panel.open {
      display: flex;
      flex-direction: column;
    }
    .mobile-nav-panel a {
      display: flex;
      align-items: center;
      padding: var(--space-md);
      font-size: calc(var(--font-size-lg) * var(--font-scale));
      color: var(--color-text-primary);
      text-decoration: none;
      border-radius: var(--radius-md);
      min-height: 56px;
    }
    .mobile-nav-panel a:hover {
      background-color: var(--color-bg);
    }
    .mobile-nav-panel a.nav-current {
      color: var(--color-primary);
      background-color: var(--color-primary-light);
      font-weight: var(--font-weight-semibold);
    }

    /* ========== Main Content ========== */
    .main-content {
      max-width: 1000px;
      margin: 0 auto;
      padding: var(--space-lg);
    }

    /* ========== Page Header ========== */
    .page-header {
      text-align: center;
      padding: var(--space-xl) 0 var(--space-lg);
    }
    .page-header h1 {
      font-size: calc(var(--font-size-h1) * var(--font-scale));
      color: var(--color-text-primary);
      margin-bottom: var(--space-sm);
    }
    .page-header .subtitle {
      font-size: calc(var(--font-size-lg) * var(--font-scale));
      color: var(--color-text-secondary);
      max-width: 600px;
      margin: 0 auto;
    }

    /* ========== Filter Tabs ========== */
    .filter-section {
      margin-bottom: var(--space-lg);
    }
    .filter-label {
      font-size: calc(var(--font-size-sm) * var(--font-scale));
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-sm);
    }
    .filter-tabs {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
    }
    .filter-tab {
      padding: var(--space-sm) var(--space-lg);
      font-size: calc(var(--font-size-base) * var(--font-scale));
      font-weight: var(--font-weight-medium);
      font-family: var(--font-family-base);
      color: var(--color-text-secondary);
      background: var(--color-surface);
      border: 2px solid var(--color-border-light);
      border-radius: var(--radius-tag);
      cursor: pointer;
      white-space: nowrap;
      min-height: 48px;
      transition: all var(--transition-fast);
    }
    .filter-tab:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }
    .filter-tab.active {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
      font-weight: var(--font-weight-bold);
    }

    /* ========== Events List ========== */
    .events-list {
      display: flex;
      flex-direction: column;
      gap: var(--card-gap);
    }

    .event-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-card);
      padding: var(--card-padding);
      box-shadow: var(--shadow-card);
      position: relative;
      transition: box-shadow var(--transition-base);
    }
    .event-card:hover {
      box-shadow: var(--shadow-card-hover);
    }
    .event-card.past {
      opacity: 0.65;
      background: var(--color-bg);
    }
    .event-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-md);
    }
    .event-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 16px;
      font-size: calc(var(--font-size-xs) * var(--font-scale));
      font-weight: var(--font-weight-semibold);
      border-radius: var(--radius-tag);
      white-space: nowrap;
    }
    .event-type-badge.offline {
      color: var(--color-primary);
      background: var(--color-primary-light);
    }
    .event-type-badge.online {
      color: var(--color-info);
      background: var(--color-info-light);
    }
    .event-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 14px;
      font-size: calc(var(--font-size-xs) * var(--font-scale));
      font-weight: var(--font-weight-semibold);
      border-radius: var(--radius-tag);
      white-space: nowrap;
    }
    .event-status-badge.upcoming {
      color: var(--color-success);
      background: var(--color-success-light);
    }
    .event-status-badge.ongoing {
      color: var(--color-warning);
      background: var(--color-warning-light);
    }
    .event-status-badge.ended {
      color: var(--color-text-tertiary);
      background: var(--color-bg-alt);
    }

    .event-card-title {
      font-size: calc(var(--font-size-xl) * var(--font-scale));
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-md);
      line-height: var(--line-height-heading);
    }
    .event-card-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-sm) var(--space-lg);
      margin-bottom: var(--space-md);
    }
    .event-detail-item {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      font-size: calc(var(--font-size-base) * var(--font-scale));
      color: var(--color-text-secondary);
      line-height: var(--line-height-base);
    }
    .event-detail-icon {
      flex-shrink: 0;
      font-size: 20px;
      line-height: 1.6;
    }
    .event-card-desc {
      font-size: calc(var(--font-size-base) * var(--font-scale));
      color: var(--color-text-secondary);
      line-height: var(--line-height-base);
      margin-bottom: var(--space-lg);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .event-card-desc.expanded {
      -webkit-line-clamp: unset;
      display: block;
    }

    /* Progress Bar */
    .event-progress {
      margin-bottom: var(--space-lg);
    }
    .event-progress-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-xs);
      font-size: calc(var(--font-size-sm) * var(--font-scale));
      color: var(--color-text-secondary);
    }
    .event-progress-bar {
      height: 10px;
      background: var(--color-bg-alt);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .event-progress-fill {
      height: 100%;
      background: var(--color-primary);
      border-radius: var(--radius-full);
      transition: width var(--transition-slow);
    }
    .event-progress-fill.full {
      background: var(--color-text-disabled);
    }

    .event-card-actions {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding-top: var(--space-md);
      border-top: 1px solid var(--color-border-light);
    }
    .event-card-actions .btn {
      min-height: 48px;
      padding: 0 var(--space-xl);
      font-size: calc(var(--font-size-base) * var(--font-scale));
    }
    .btn-registered {
      background: var(--color-success);
      color: #fff;
      border-color: var(--color-success);
      cursor: default;
      pointer-events: none;
      opacity: 1;
    }
    .btn-full {
      background: var(--color-text-disabled);
      color: #fff;
      border-color: var(--color-text-disabled);
      cursor: not-allowed;
      pointer-events: none;
      opacity: 0.7;
    }
    .btn-ended {
      background: var(--color-bg-alt);
      color: var(--color-text-tertiary);
      border-color: var(--color-border-light);
      cursor: not-allowed;
      pointer-events: none;
    }

    /* Detail Expansion */
    .event-detail-expand {
      margin-top: var(--space-md);
      padding-top: var(--space-md);
      border-top: 1px solid var(--color-border-light);
    }
    .event-detail-full-desc {
      font-size: calc(var(--font-size-base) * var(--font-scale));
      color: var(--color-text-secondary);
      line-height: var(--line-height-base);
      margin-bottom: var(--space-md);
    }
    .event-attendee-list-title {
      font-size: calc(var(--font-size-md) * var(--font-scale));
      font-weight: var(--font-weight-bold);
      margin-bottom: var(--space-md);
    }
    .event-attendee-list {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }
    .attendee-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      background: var(--color-bg);
      border-radius: var(--radius-md);
      font-size: calc(var(--font-size-base) * var(--font-scale));
    }
    .attendee-avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-avatar);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: calc(var(--font-size-sm) * var(--font-scale));
      font-weight: var(--font-weight-bold);
      flex-shrink: 0;
    }

    /* Confirm Dialog */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      z-index: var(--z-modal-overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: rgba(45, 45, 45, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: var(--space-md);
      animation: modalFadeIn var(--transition-base) ease;
    }
    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .confirm-dialog {
      width: 100%;
      max-width: 440px;
      background: var(--color-surface);
      border-radius: var(--radius-modal);
      box-shadow: var(--shadow-modal);
      padding: var(--space-lg);
      text-align: center;
      animation: modalScaleIn var(--transition-base) ease;
    }
    @keyframes modalScaleIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .confirm-dialog h3 {
      font-size: calc(var(--font-size-lg) * var(--font-scale));
      font-weight: var(--font-weight-bold);
      margin-bottom: var(--space-md);
    }
    .confirm-dialog p {
      font-size: calc(var(--font-size-base) * var(--font-scale));
      color: var(--color-text-secondary);
      margin-bottom: var(--space-lg);
      line-height: var(--line-height-base);
    }
    .confirm-actions {
      display: flex;
      gap: var(--space-md);
      justify-content: center;
    }
    .confirm-actions .btn {
      min-height: 50px;
      padding: 0 var(--space-xl);
      font-size: calc(var(--font-size-base) * var(--font-scale));
    }

    /* ========== Empty State ========== */
    .events-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-xxl) var(--space-md);
      background: var(--color-surface);
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-card);
      color: var(--color-text-tertiary);
    }
    .events-empty-icon {
      font-size: 56px;
      margin-bottom: var(--space-md);
      opacity: 0.5;
    }
    .events-empty p {
      font-size: calc(var(--font-size-base) * var(--font-scale));
      margin: 0;
    }

    /* ========== Footer ========== */
    .site-footer {
      text-align: center;
      padding: var(--space-xl) var(--space-md);
      color: var(--color-text-tertiary);
      font-size: calc(var(--font-size-sm) * var(--font-scale));
      border-top: 1px solid var(--color-border-light);
      margin-top: var(--space-xl);
    }

    /* ========== Responsive ========== */
    @media (max-width: 1024px) {
      .main-nav a {
        padding: var(--space-sm);
        font-size: calc(16px * var(--font-scale));
      }
    }

    @media (max-width: 768px) {
      .header-inner {
        padding: 0 var(--space-md);
      }
      .main-nav {
        display: none;
      }
      .mobile-nav-toggle {
        display: flex;
      }
      .header-logo {
        font-size: calc(var(--font-size-lg) * var(--font-scale));
      }
      .user-menu-trigger .user-menu-name {
        display: none;
      }
      .main-content {
        padding: var(--space-md);
      }
      .page-header h1 {
        font-size: calc(var(--font-size-2xl) * var(--font-scale));
      }
      .event-card-details {
        grid-template-columns: 1fr;
      }
      .event-card-title {
        font-size: calc(var(--font-size-lg) * var(--font-scale));
      }
    }

    @media (max-width: 576px) {
      .filter-tabs {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: var(--space-xs);
      }
      .filter-tab {
        flex-shrink: 0;
      }
      .event-card {
        padding: var(--space-md);
      }
      .event-card-actions {
        flex-direction: column;
        gap: var(--space-sm);
      }
      .event-card-actions .btn {
        width: 100%;
      }
      .confirm-actions {
        flex-direction: column;
      }
    }
  </style>
</head>

    <a href="privacy.html">🔒 隐私设置</a>
    <a href="#" id="mobileLogoutBtn" style="color: var(--color-danger);">🚪 退出登录</a>
  </div>

  <!-- ========== Main Content ========== -->
  <main class="main-content" id="main-content">

    <!-- Page Header -->
    <div class="page-header">
      <h1>📅 交友活动</h1>
      <p class="subtitle">线上线下活动，让相遇更自然</p>
    </div>

    <!-- Type Filter -->
    <div class="filter-section">
      <div class="filter-label">活动类型</div>
      <div class="filter-tabs" id="typeFilterTabs">
        <button class="filter-tab active" data-type="">全部</button>
        <button class="filter-tab" data-type="offline">📍 线下活动</button>
        <button class="filter-tab" data-type="online">💻 线上活动</button>
      </div>
    </div>

    <!-- Status Filter -->
    <div class="filter-section">
      <div class="filter-label">活动状态</div>
      <div class="filter-tabs" id="statusFilterTabs">
        <button class="filter-tab active" data-status="upcoming">🔜 即将开始</button>
        <button class="filter-tab" data-status="ongoing">🟢 进行中</button>
        <button class="filter-tab" data-status="ended">✅ 已结束</button>
      </div>
    </div>

    <!-- Events List -->
    <div class="events-list" id="eventsList">
      <!-- Filled by JS -->
    </div>

  </main>

  <!-- Confirm Dialog -->
  <div class="confirm-overlay" id="confirmDialog" style="display: none;">
    <div class="confirm-dialog">
      <h3>确认报名</h3>
      <p id="confirmMessage">确认报名参加此活动？</p>
      <div class="confirm-actions">
        <button class="btn btn-outline" id="confirmCancelBtn">取消</button>
        <button class="btn btn-primary" id="confirmOkBtn">确认报名</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>❤️ 中年相亲网 — 帮您找到人生第二段幸福</p>
    <p style="margin-top: 4px;">© 2026 中年相亲网 版权所有</p>
  </footer>

  <!-- Common JS -->
  <script src="../js/utils.js"></script>
  <script src="../js/store.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/match.js"></script>
  <script src="../data/seed-data.js"></script>

  <script>
  (function () {
    'use strict';

    // =========================================================================
    // 1. Auth Guard
    // =========================================================================
    if (!Auth.requireAuth('events.html')) {
      return;
    }

    var currentUser = Store.getCurrentUser();
    var currentUserId = currentUser.id;
    var activeType = '';
    var activeStatus = 'upcoming';
    var expandedEventId = null;
    var pendingRegisterEventId = null;

    // =========================================================================
    // 2. Header
    // =========================================================================
    function initHeader() {
      var userName = currentUser.name || '用户';
      var initial = userName.charAt(0);
      document.getElementById('headerUserName').textContent = userName;
      var avatarEl = document.getElementById('headerAvatar');
      avatarEl.textContent = initial;
      var colors = ['#D45161', '#E8A87C', '#5B8C5A', '#4A7FB5', '#E09F3E', '#C44A58', '#6B5B9E', '#3D8B7E'];
      var colorIndex = 0;
      if (currentUser.id) {
        for (var i = 0; i < currentUser.id.length; i++) {
          colorIndex += currentUser.id.charCodeAt(i);
        }
        colorIndex = colorIndex % colors.length;
      }
      avatarEl.style.backgroundColor = colors[colorIndex];
    }

    function initUserMenu() {
      var menu = document.getElementById('userMenu');
      var trigger = document.getElementById('userMenuTrigger');
      trigger.addEventListener('click', function (e) {
        e.stopPropagation();
        var isOpen = menu.classList.contains('open');
        if (isOpen) {
          menu.classList.remove('open');
          trigger.setAttribute('aria-expanded', 'false');
        } else {
          menu.classList.add('open');
          trigger.setAttribute('aria-expanded', 'true');
        }
      });
      document.addEventListener('click', function () {
        menu.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
      });
      document.getElementById('userDropdown').addEventListener('click', function (e) {
        e.stopPropagation();
      });
      document.getElementById('logoutBtn').addEventListener('click', function () {
        Auth.logout();
      });
      var mobileLogout = document.getElementById('mobileLogoutBtn');
      if (mobileLogout) {
        mobileLogout.addEventListener('click', function (e) {
          e.preventDefault();
          Auth.logout();
        });
      }
    }

    function initMobileNav() {
      var toggle = document.getElementById('mobileNavToggle');
      var panel = document.getElementById('mobileNavPanel');
      toggle.addEventListener('click', function () {
        var isOpen = panel.classList.contains('open');
        if (isOpen) {
          panel.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
          toggle.setAttribute('aria-label', '打开菜单');
        } else {
          panel.classList.add('open');
          toggle.setAttribute('aria-expanded', 'true');
          toggle.setAttribute('aria-label', '关闭菜单');
        }
      });
    }

    // =========================================================================
    // 3. Helpers
    // =========================================================================
    var avatarColors = ['#D45161', '#E8A87C', '#5B8C5A', '#4A7FB5', '#E09F3E', '#C44A58', '#6B5B9E', '#3D8B7E', '#C88052', '#BF3D4D'];

    function getAvatarColor(id) {
      var sum = 0;
      if (id) {
        for (var i = 0; i < id.length; i++) {
          sum += id.charCodeAt(i);
        }
      }
      return avatarColors[sum % avatarColors.length];
    }

    function getUserName(userId) {
      var user = Store.getUserById(userId);
      return user ? user.name : '未知用户';
    }

    function getUserInitial(userId) {
      var name = getUserName(userId);
      return name.charAt(0);
    }

    function getEventDate(event) {
      // Handle both data formats
      if (event.startTime) return event.startTime;
      if (event.eventDate) return event.eventDate;
      return event.createdAt || '';
    }

    function getEventEndDate(event) {
      if (event.endTime) return event.endTime;
      return null;
    }

    function getEventStatus(event) {
      if (event.status) return event.status;
      // Compute from dates
      var now = new Date();
      var start = new Date(getEventDate(event));
      var end = event.endTime ? new Date(event.endTime) : null;
      if (end && now > end) return 'ended';
      if (now >= start && (!end || now <= end)) return 'ongoing';
      if (now < start) return 'upcoming';
      return 'ended';
    }

    function getAttendeeCount(event) {
      return event.attendeeCount || (event.attendees ? event.attendees.length : (event.attendeeIds ? event.attendeeIds.length : 0));
    }

    function getMaxAttendees(event) {
      return event.maxAttendees || event.maxAttendees || 30;
    }

    function getAttendees(event) {
      return event.attendees || event.attendeeIds || [];
    }

    function isRegistered(event) {
      var attendees = getAttendees(event);
      return attendees.indexOf(currentUserId) !== -1;
    }

    function formatEventDate(dateStr) {
      try {
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return '日期待定';
        var year = d.getFullYear();
        var month = d.getMonth() + 1;
        var day = d.getDate();
        var h = d.getHours();
        var m = d.getMinutes();
        return year + '年' + month + '月' + day + '日 ' + (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
      } catch (e) {
        return '日期待定';
      }
    }

    function formatEventTimeRange(event) {
      var start = formatEventDate(getEventDate(event));
      var endDate = getEventEndDate(event);
      if (endDate) {
        try {
          var d = new Date(endDate);
          if (!isNaN(d.getTime())) {
            var h = d.getHours();
            var m = d.getMinutes();
            start += '-' + (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
          }
        } catch (e) {}
      }
      return start;
    }

    // =========================================================================
    // 4. Render Events
    // =========================================================================
    function loadAndRenderEvents() {
      var allEvents = Store.getEvents();

      var filtered = allEvents;

      // Filter by type
      if (activeType) {
        filtered = filtered.filter(function (e) {
          var type = (e.type || '').toLowerCase();
          return type === activeType;
        });
      }

      // Filter by status
      if (activeStatus) {
        filtered = filtered.filter(function (e) {
          return getEventStatus(e) === activeStatus;
        });
      }

      // Sort: upcoming first, then ongoing, then ended
      var statusOrder = { upcoming: 0, ongoing: 1, ended: 2 };
      filtered.sort(function (a, b) {
        var sa = statusOrder[getEventStatus(a)] !== undefined ? statusOrder[getEventStatus(a)] : 3;
        var sb = statusOrder[getEventStatus(b)] !== undefined ? statusOrder[getEventStatus(b)] : 3;
        if (sa !== sb) return sa - sb;
        return new Date(getEventDate(a)) - new Date(getEventDate(b));
      });

      var list = document.getElementById('eventsList');

      if (filtered.length === 0) {
        list.innerHTML =
          '<div class="events-empty">' +
          '<div class="events-empty-icon">📅</div>' +
          '<p>暂无活动，敬请期待</p>' +
          '</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < filtered.length; i++) {
        var event = filtered[i];
        var status = getEventStatus(event);
        var isPast = status === 'ended';
        var registered = isRegistered(event);
        var attendeeCount = getAttendeeCount(event);
        var maxAttendees = getMaxAttendees(event);
        var isFull = !isPast && attendeeCount >= maxAttendees;

        var typeLabel = (event.type === 'online' || event.type === '线上活动') ? '💻 线上活动' : '📍 线下活动';
        var typeClass = (event.type === 'online' || event.type === '线上活动') ? 'online' : 'offline';

        var statusLabel = '';
        if (status === 'upcoming') statusLabel = '🔜 即将开始';
        else if (status === 'ongoing') statusLabel = '🟢 进行中';
        else statusLabel = '✅ 已结束';

        var progressPercent = maxAttendees > 0 ? Math.round((attendeeCount / maxAttendees) * 100) : 0;
        if (progressPercent > 100) progressPercent = 100;

        var isExpanded = (expandedEventId === event.id);

        html += '<div class="event-card' + (isPast ? ' past' : '') + '" id="eventCard-' + escapeHtml(event.id) + '">';

        // Top badges
        html += '<div class="event-card-top">';
        html += '<span class="event-type-badge ' + typeClass + '">' + typeLabel + '</span>';
        html += '<span class="event-status-badge ' + status + '">' + statusLabel + '</span>';
        html += '</div>';

        // Title
        html += '<div class="event-card-title">' + escapeHtml(event.title || event.name || '未命名活动') + '</div>';

        // Details grid
        html += '<div class="event-card-details">';
        html += '<div class="event-detail-item"><span class="event-detail-icon">📅</span><span>' + escapeHtml(formatEventTimeRange(event)) + '</span></div>';
        var location = event.location || '';
        if (event.province || event.city) {
          location = (event.province || '') + (event.city ? ' ' + event.city : '') + (event.location ? ' ' + event.location : '');
        }
        html += '<div class="event-detail-item"><span class="event-detail-icon">📍</span><span>' + escapeHtml(location || '待定') + '</span></div>';
        html += '<div class="event-detail-item"><span class="event-detail-icon">👥</span><span>报名人数: ' + attendeeCount + '/' + maxAttendees + ' 人</span></div>';
        // Province/city info
        var region = event.province || '';
        if (region) {
          html += '<div class="event-detail-item"><span class="event-detail-icon">🏷️</span><span>' + escapeHtml(region) + '</span></div>';
        } else {
          html += '<div class="event-detail-item"></div>';
        }
        html += '</div>';

        // Description
        var desc = event.description || '';
        html += '<div class="event-card-desc' + (isExpanded ? ' expanded' : '') + '" id="desc-' + escapeHtml(event.id) + '">' + escapeHtml(desc) + '</div>';

        // Progress bar
        html += '<div class="event-progress">';
        html += '<div class="event-progress-label"><span>报名进度</span><span>' + progressPercent + '%</span></div>';
        html += '<div class="event-progress-bar"><div class="event-progress-fill' + (progressPercent >= 100 ? ' full' : '') + '" style="width:' + progressPercent + '%;"></div></div>';
        html += '</div>';

        // Actions
        html += '<div class="event-card-actions">';
        html += '<button class="btn btn-outline event-detail-toggle" data-event-id="' + escapeHtml(event.id) + '">' + (isExpanded ? '收起详情' : '查看详情') + '</button>';

        if (isPast) {
          html += '<button class="btn btn-ended" disabled>已结束</button>';
        } else if (registered) {
          html += '<button class="btn btn-registered" disabled>✓ 已报名</button>';
        } else if (isFull) {
          html += '<button class="btn btn-full" disabled>已满员</button>';
        } else {
          html += '<button class="btn btn-primary event-register-btn" data-event-id="' + escapeHtml(event.id) + '">立即报名</button>';
        }
        html += '</div>';

        // Expanded detail section
        if (isExpanded) {
          html += '<div class="event-detail-expand" id="expand-' + escapeHtml(event.id) + '">';
          html += '<div class="event-detail-full-desc">' + escapeHtml(desc) + '</div>';

          // Attendee list
          var attendees = getAttendees(event);
          html += '<div class="event-attendee-list-title">已报名成员 (' + attendees.length + '人)</div>';
          html += '<div class="event-attendee-list">';
          if (attendees.length === 0) {
            html += '<p style="color:var(--color-text-tertiary);">暂无报名</p>';
          } else {
            for (var a = 0; a < Math.min(attendees.length, 15); a++) {
              var uid = attendees[a];
              var name = getUserName(uid);
              var initial = getUserInitial(uid);
              var color = getAvatarColor(uid);
              html +=
                '<div class="attendee-item">' +
                '<span class="attendee-avatar" style="background-color:' + color + ';">' + escapeHtml(initial) + '</span>' +
                '<span>' + escapeHtml(name) + '</span>' +
                '</div>';
            }
            if (attendees.length > 15) {
              html += '<div class="attendee-item" style="color:var(--color-text-tertiary);">等 ' + attendees.length + ' 人...</div>';
            }
          }
          html += '</div>';
          html += '</div>';
        }

        html += '</div>';
      }

      list.innerHTML = html;

      // Bind detail toggle buttons
      var toggles = list.querySelectorAll('.event-detail-toggle');
      for (var t = 0; t < toggles.length; t++) {
        toggles[t].addEventListener('click', function () {
          var eid = this.getAttribute('data-event-id');
          if (expandedEventId === eid) {
            expandedEventId = null;
          } else {
            expandedEventId = eid;
          }
          loadAndRenderEvents();
          // Scroll to card
          var card = document.getElementById('eventCard-' + eid);
          if (card && expandedEventId === eid) {
            setTimeout(function () {
              card.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
          }
        });
      }

      // Bind register buttons
      var regBtns = list.querySelectorAll('.event-register-btn');
      for (var r = 0; r < regBtns.length; r++) {
        regBtns[r].addEventListener('click', function () {
          var eid = this.getAttribute('data-event-id');
          showConfirmDialog(eid);
        });
      }
    }

    // =========================================================================
    // 5. Confirm Dialog
    // =========================================================================
    function showConfirmDialog(eventId) {
      var event = Store.getEventById(eventId);
      if (!event) return;
      pendingRegisterEventId = eventId;
      var title = event.title || event.name || '此活动';
      document.getElementById('confirmMessage').textContent = '确认报名参加【' + title + '】？';
      document.getElementById('confirmDialog').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function hideConfirmDialog() {
      document.getElementById('confirmDialog').style.display = 'none';
      document.body.style.overflow = '';
      pendingRegisterEventId = null;
    }

    function initConfirmDialog() {
      document.getElementById('confirmCancelBtn').addEventListener('click', hideConfirmDialog);
      document.getElementById('confirmOkBtn').addEventListener('click', function () {
        if (!pendingRegisterEventId) return;
        var success = Store.registerForEvent(pendingRegisterEventId, currentUserId);
        if (success) {
          showToast('报名成功！', 'success', 3000);
          loadAndRenderEvents();
        } else {
          showToast('报名失败，请重试', 'error');
        }
        hideConfirmDialog();
      });

      // Close on overlay click
      document.getElementById('confirmDialog').addEventListener('click', function (e) {
        if (e.target === this) {
          hideConfirmDialog();
        }
      });

      // Escape
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && document.getElementById('confirmDialog').style.display !== 'none') {
          hideConfirmDialog();
        }
      });
    }

    // =========================================================================
    // 6. Filter Tabs
    // =========================================================================
    function initFilters() {
      // Type filter
      var typeTabs = document.getElementById('typeFilterTabs').querySelectorAll('.filter-tab');
      for (var i = 0; i < typeTabs.length; i++) {
        typeTabs[i].addEventListener('click', function () {
          for (var t = 0; t < typeTabs.length; t++) {
            typeTabs[t].classList.remove('active');
          }
          this.classList.add('active');
          activeType = this.getAttribute('data-type') || '';
          expandedEventId = null;
          loadAndRenderEvents();
        });
      }

      // Status filter
      var statusTabs = document.getElementById('statusFilterTabs').querySelectorAll('.filter-tab');
      for (var j = 0; j < statusTabs.length; j++) {
        statusTabs[j].addEventListener('click', function () {
          for (var s = 0; s < statusTabs.length; s++) {
            statusTabs[s].classList.remove('active');
          }
          this.classList.add('active');
          activeStatus = this.getAttribute('data-status') || 'upcoming';
          expandedEventId = null;
          loadAndRenderEvents();
        });
      }
    }

    // =========================================================================
    // 7. Init All
    // =========================================================================
    function init() {
      initHeader();
      initUserMenu();
      initMobileNav();
      initFilters();
      initConfirmDialog();
      loadAndRenderEvents();
      console.log('📅 活动页面就绪');
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
  </script>
</body>
</html>
