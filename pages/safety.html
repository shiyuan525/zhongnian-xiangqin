<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全交友指南 - 中年相亲网</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    /* ===== Page-Specific Styles ===== */
    :root {
      --warm-red: #c0392b;
      --warm-red-light: #e74c3c;
      --warm-pink: #f8e8e8;
      --warm-cream: #fef9f4;
      --warm-gold: #d4a574;
      --warm-brown: #8b5e3c;
      --safety-blue: #2c6fce;
      --safety-blue-light: #e8f0fe;
      --safety-green: #1a8a4a;
      --safety-green-light: #e6f7ee;
      --safety-orange: #e67e22;
      --safety-orange-light: #fef5ec;
      --safety-purple: #7b3fa3;
      --safety-purple-light: #f5edfa;
      --safety-red: #c0392b;
      --safety-red-light: #fdeaea;
    }

    body {
      background: #f7f5f2;
    }

    /* ===== Public Header (same as stories) ===== */
    .pub-header {
      background: #fff;
      border-bottom: 3px solid var(--warm-red);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .pub-header .inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      gap: 16px;
    }
    .pub-header .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--warm-red);
      font-size: 24px;
      font-weight: 700;
      white-space: nowrap;
    }
    .pub-header .logo .icon { font-size: 32px; }
    .pub-header .main-nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pub-header .main-nav a {
      text-decoration: none;
      color: #555;
      font-size: 16px;
      padding: 8px 16px;
      border-radius: 6px;
      transition: all 0.2s;
      font-weight: 500;
    }
    .pub-header .main-nav a:hover,
    .pub-header .main-nav a.active {
      background: var(--warm-pink);
      color: var(--warm-red);
    }
    .pub-header .auth-btns {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .pub-header .btn-login {
      padding: 9px 22px;
      border: 2px solid var(--warm-red);
      background: transparent;
      color: var(--warm-red);
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .pub-header .btn-login:hover { background: var(--warm-pink); }
    .pub-header .btn-register {
      padding: 9px 22px;
      background: var(--warm-red);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .pub-header .btn-register:hover { background: var(--warm-red-light); }
    .pub-header .user-nav {
      display: none;
      align-items: center;
      gap: 8px;
    }
    .pub-header .user-nav .user-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--warm-red);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
    }
    .pub-header .user-nav .user-name {
      font-weight: 600;
      color: #333;
    }
    .pub-header .user-nav .logout-btn {
      background: none;
      border: 1px solid #ccc;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #666;
    }

    /* ===== Page Title Area ===== */
    .page-hero {
      text-align: center;
      padding: 48px 24px 12px;
    }
    .page-hero h1 {
      font-size: 36px;
      color: #333;
      margin: 0 0 10px;
      font-weight: 700;
    }
    .page-hero .hero-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 8px;
    }
    .page-hero .subtitle {
      font-size: 18px;
      color: #666;
      max-width: 650px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ===== Category Tabs ===== */
    .category-tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 24px 24px 12px;
      max-width: 900px;
      margin: 0 auto;
    }
    .category-tab {
      padding: 10px 24px;
      border: 2px solid #ddd;
      background: #fff;
      border-radius: 30px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      color: #555;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .category-tab:hover {
      border-color: var(--safety-blue);
      color: var(--safety-blue);
    }
    .category-tab.active {
      background: var(--safety-blue);
      color: #fff;
      border-color: var(--safety-blue);
    }

    /* ===== Tips Container ===== */
    .tips-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 40px;
    }

    /* ===== Accordion Card ===== */
    .tip-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 16px;
      overflow: hidden;
      border: 1px solid #e8e8e8;
      transition: box-shadow 0.2s;
    }
    .tip-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .tip-card.open {
      border-color: #c0d0e0;
      box-shadow: 0 4px 20px rgba(44,111,206,0.12);
    }
    .tip-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      cursor: pointer;
      user-select: none;
      gap: 12px;
      transition: background 0.15s;
    }
    .tip-header:hover {
      background: #fafbfc;
    }
    .tip-header .tip-icon {
      font-size: 28px;
      flex-shrink: 0;
    }
    .tip-header .tip-title-area {
      flex: 1;
      min-width: 0;
    }
    .tip-header .tip-title {
      font-size: 20px;
      font-weight: 700;
      color: #333;
      margin: 0;
      line-height: 1.4;
    }
    .tip-header .tip-category-badge {
      display: inline-block;
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 600;
      margin-top: 4px;
    }
    .badge-chat { background: var(--safety-blue-light); color: var(--safety-blue); }
    .badge-meet { background: var(--safety-green-light); color: var(--safety-green); }
    .badge-privacy { background: var(--safety-purple-light); color: var(--safety-purple); }
    .badge-scam { background: var(--safety-red-light); color: var(--safety-red); }

    .tip-header .expand-icon {
      font-size: 20px;
      color: #999;
      transition: transform 0.3s;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }
    .tip-card.open .expand-icon {
      transform: rotate(180deg);
      color: var(--safety-blue);
    }

    .tip-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.35s ease;
    }
    .tip-card.open .tip-body {
      max-height: 600px;
    }
    .tip-body-inner {
      padding: 0 24px 22px;
      font-size: 18px;
      line-height: 2;
      color: #444;
    }
    .tip-body-inner ul {
      margin: 8px 0 0;
      padding-left: 24px;
    }
    .tip-body-inner li {
      margin-bottom: 8px;
    }
    .tip-body-inner p {
      margin: 0 0 10px;
    }

    /* ===== Emergency Card ===== */
    .emergency-card {
      max-width: 900px;
      margin: 0 auto 40px;
      padding: 0 24px;
    }
    .emergency-card .inner {
      background: linear-gradient(135deg, #fff5f5 0%, #fff0e6 100%);
      border: 3px solid var(--safety-red);
      border-radius: 16px;
      padding: 32px 28px;
      text-align: center;
    }
    .emergency-card h3 {
      font-size: 24px;
      color: var(--safety-red);
      margin: 0 0 16px;
    }
    .emergency-card .phone-numbers {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .emergency-card .phone-item {
      text-align: center;
    }
    .emergency-card .phone-label {
      font-size: 15px;
      color: #666;
      margin-bottom: 4px;
    }
    .emergency-card .phone-number {
      font-size: 32px;
      font-weight: 800;
      color: var(--safety-red);
      letter-spacing: 2px;
    }
    .emergency-card .note {
      font-size: 16px;
      color: #666;
      margin: 0;
    }
    .emergency-card .report-btn {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 28px;
      background: var(--safety-red);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
    }

    /* ===== CTA Banner ===== */
    .cta-banner {
      background: linear-gradient(135deg, #2c6fce 0%, #4a90d9 50%, #357abd 100%);
      color: #fff;
      text-align: center;
      padding: 48px 24px;
    }
    .cta-banner h2 {
      font-size: 28px;
      margin: 0 0 8px;
      font-weight: 700;
    }
    .cta-banner p {
      font-size: 17px;
      margin: 0 0 22px;
      opacity: 0.9;
    }
    .cta-banner .cta-btn {
      display: inline-block;
      background: #fff;
      color: var(--safety-blue);
      padding: 13px 36px;
      border-radius: 30px;
      font-size: 19px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s;
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
    }
    .cta-banner .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
    }

    .empty-state {
      text-align: center;
      padding: 40px 24px;
      color: #999;
      font-size: 18px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 700px) {
      .tip-header .tip-title { font-size: 18px; }
      .tip-body-inner { font-size: 16px; }
      .emergency-card .phone-numbers { gap: 20px; }
      .emergency-card .phone-number { font-size: 26px; }
      .pub-header .inner { flex-wrap: wrap; gap: 10px; }
      .pub-header .main-nav { order: 3; width: 100%; justify-content: center; }
      .pub-header .main-nav a { font-size: 14px; padding: 6px 10px; }
      .category-tab { padding: 8px 16px; font-size: 14px; }
    }
  </style>
</head>

<header class="pub-header">

    content: '无论对方以什么理由（生病急用钱、生意周转、家人出事、投资赚钱等）向您借钱，请坚决拒绝。真正想和您交往的人，不会在认识不久就向您要钱。如果对方以"考验感情"为由要求转账，这本身就是最大的危险信号。记住一句话：谈钱伤感情，谈感情不借钱。',
    points: ['任何理由的借钱都要拒绝', '"考验感情"要求转账是危险信号', '如果对方说"这是我们之间的秘密，不要告诉别人"——立即停止联系', '发现可疑行为，立即通过平台举报']
  }
];

// ===== Get Tips =====
function getTips() {
  // Try Store
  if (typeof Store !== 'undefined' && typeof Store.getSafetyTips === 'function') {
    var storeTips = Store.getSafetyTips();
    if (storeTips && storeTips.length > 0) return storeTips;
  }
  // Try localStorage
  try {
    var data = localStorage.getItem('safetyTips');
    if (data) {
      var parsed = JSON.parse(data);
      if (parsed && parsed.length > 0) return parsed;
    }
  } catch(e) {}
  // Fallback
  return hardcodedTips;
}

// ===== Render Tips =====
var currentCategory = 'all';
var openTipId = null;

function renderTips(category) {
  var container = document.getElementById('tipsContainer');
  var tips = getTips();
  var filtered = category === 'all' ? tips : tips.filter(function(t) {
    return t.category === category;
  });

  if (!filtered || filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">该分类暂无提示</div>';
    return;
  }

  var html = '';
  filtered.forEach(function(tip) {
    var isOpen = tip.id === openTipId;
    var badgeClass = '';
    switch(tip.category) {
      case '聊天安全': badgeClass = 'badge-chat'; break;
      case '见面安全': badgeClass = 'badge-meet'; break;
      case '隐私保护': badgeClass = 'badge-privacy'; break;
      case '防骗指南': badgeClass = 'badge-scam'; break;
    }

    var pointsHtml = '';
    if (tip.points && tip.points.length > 0) {
      pointsHtml = '<ul>' + tip.points.map(function(p) {
        return '<li>' + escapeHtml(p) + '</li>';
      }).join('') + '</ul>';
    }

    html += '<div class="tip-card' + (isOpen ? ' open' : '') + '" data-tip-id="' + tip.id + '">';
    html += '  <div class="tip-header" onclick="toggleTip(' + tip.id + ')">';
    html += '    <span class="tip-icon">' + escapeHtml(tip.icon) + '</span>';
    html += '    <div class="tip-title-area">';
    html += '      <h3 class="tip-title">' + escapeHtml(tip.title) + '</h3>';
    html += '      <span class="tip-category-badge ' + badgeClass + '">' + escapeHtml(tip.category) + '</span>';
    html += '    </div>';
    html += '    <span class="expand-icon">▼</span>';
    html += '  </div>';
    html += '  <div class="tip-body">';
    html += '    <div class="tip-body-inner">';
    html += '      <p>' + escapeHtml(tip.content) + '</p>';
    html +=        pointsHtml;
    html += '    </div>';
    html += '  </div>';
    html += '</div>';
  });

  container.innerHTML = html;
}

// ===== Toggle Tip =====
window.toggleTip = function(tipId) {
  if (openTipId === tipId) {
    openTipId = null;
  } else {
    openTipId = tipId;
  }
  renderTips(currentCategory);
};

// ===== Helper =====
function escapeHtml(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(String(str)));
  return div.innerHTML;
}

// ===== Category Tabs =====
document.getElementById('categoryTabs').addEventListener('click', function(e) {
  var tab = e.target.closest('.category-tab');
  if (!tab) return;
  var category = tab.getAttribute('data-category');
  currentCategory = category;
  openTipId = null; // close any open tip when switching categories

  // Update active tab
  var tabs = document.querySelectorAll('.category-tab');
  tabs.forEach(function(t) { t.classList.remove('active'); });
  tab.classList.add('active');

  renderTips(category);
});

// ===== Toast =====
function showToast(msg) {
  var toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2c6fce;color:#fff;padding:12px 28px;border-radius:30px;font-size:18px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);animation:fadeInUp 0.3s ease;pointer-events:none;';
  document.body.appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.4s';
    setTimeout(function() { if(toast.parentNode) toast.parentNode.removeChild(toast); }, 400);
  }, 2000);
}

// ===== Header: Check Login State =====
function updateHeader() {
  var currentUser = null;
  try {
    var stored = localStorage.getItem('currentUser');
    if (stored) currentUser = JSON.parse(stored);
    if (!currentUser && typeof Auth !== 'undefined' && typeof Auth.getCurrentUser === 'function') {
      currentUser = Auth.getCurrentUser();
    }
  } catch(e) {}

  var authBtns = document.getElementById('authBtns');
  var userNav = document.getElementById('userNav');

  if (currentUser && currentUser.name) {
    if (authBtns) authBtns.style.display = 'none';
    if (userNav) {
      userNav.style.display = 'flex';
      document.getElementById('userNameDisplay').textContent = currentUser.name;
      document.getElementById('userAvatar').textContent = (currentUser.name || 'U').charAt(0);
    }
  } else {
    if (authBtns) authBtns.style.display = 'flex';
    if (userNav) userNav.style.display = 'none';
  }
}

window.doLogout = function() {
  try { localStorage.removeItem('currentUser'); } catch(e) {}
  if (typeof Auth !== 'undefined' && typeof Auth.logout === 'function') {
    Auth.logout();
  }
  updateHeader();
  showToast('已退出登录');
};

// ===== Init =====
renderTips('all');
updateHeader();

})();
</script>
